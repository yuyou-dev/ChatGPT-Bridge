name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm run check
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: chatgpt-bridge-packages
          path: dist/*.zip
