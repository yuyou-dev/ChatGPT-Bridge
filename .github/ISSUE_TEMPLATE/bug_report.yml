name: Bug report
description: Report a reproducible ChatGPT Bridge problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include passwords, cookies, one-time codes, session URLs, or temporary image URLs.
  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: stage
    attributes:
      label: Failure stage
      options:
        - Installation
        - ChatGPT sign-in detection
        - Prompt submission
        - Image generation wait
        - Original asset export
        - Manifest validation
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized logs
    validations:
      required: true
